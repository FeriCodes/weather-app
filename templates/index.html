<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App - {{ city_name }}</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="weather-card">
    <h1>🌤️ Weather Dashboard</h1>
    <hr>
    <h2>📍 Location: {{ city_name }} ({{ con_name }})</h2>
    <h3>ℹ️ Condition: {{ weather_desc }}</h3>
    
    <div class="weather-details">
        <p><span>🌡️ Temperature</span><span>{{ weather_temp }}°C</span></p>
        <p><span>🤔 Feels Like</span><span>{{ feels_like }}°C</span></p>
        <p><span>💧 Humidity</span><span>{{ humidity }}%</span></p>
        <p><span>💨 Wind Speed</span><span>{{ wind_speed }} m/s</span></p>
    </div>
</div>

</body>
</html>
